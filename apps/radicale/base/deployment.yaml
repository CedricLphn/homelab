apiVersion: apps/v1
kind: Deployment
metadata:
  name: radicale
  namespace: radicale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radicale
  template:
    metadata:
      labels:
        app: radicale
    spec:
      containers:
        - name: radicale
          image: tomsquest/docker-radicale:3.6.0.0
          ports:
            - name: http
              containerPort: 5232
              protocol: TCP
          env:
            - name: TAKE_FILE_OWNERSHIP
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config/config
              subPath: config
            - name: users
              mountPath: /config/users
              subPath: users
          startupProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: radicale-data
        - name: config
          configMap:
            name: radicale-config
        - name: users
          secret:
            secretName: radicale-users
